apiVersion: apps/v1
kind: Deployment
metadata:
  name: fresheats-menu
  namespace: fresheats-ns
  labels:
    app: fresheats
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fresheats
  template:
    metadata:
      labels:
        app: fresheats
    spec:
      containers:
        - name: fresheats-menu
          image: anmutetech/fresheats-menu-api:1.2
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: APP_VERSION
              value: "1.0.0"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
